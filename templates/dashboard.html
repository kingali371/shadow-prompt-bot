<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Prompt Bot - لوحة التحكم</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tahoma', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            padding: 40px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            margin-bottom: 30px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-number {
            font-size: 48px;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .stat-label {
            font-size: 18px;
            opacity: 0.9;
        }
        
        .charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-container {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        .users-table {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        th {
            background: rgba(255,255,255,0.2);
            font-weight: bold;
        }
        
        @media (max-width: 768px) {
            .charts {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔥 Shadow Prompt Bot</h1>
            <p>لوحة تحكم وإحصائيات البوت</p>
        </div>
        
        <div class="stats" id="stats">
            <!-- سيتم تعبئة الإحصائيات عبر JavaScript -->
        </div>
        
        <div class="charts">
            <div class="chart-container">
                <canvas id="promptsChart"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="languagesChart"></canvas>
            </div>
        </div>
        
        <div class="users-table">
            <h2>📊 آخر المستخدمين</h2>
            <table id="usersTable">
                <thead>
                    <tr><th>المعرف</th><th>اسم المستخدم</th><th>اللغة</th><th>تاريخ التسجيل</th></tr>
                </thead>
                <tbody>
                    <!-- سيتم تعبئة المستخدمين عبر JavaScript -->
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        // جلب الإحصائيات
        async function loadStats() {
            const response = await fetch('/api/stats');
            const data = await response.json();
            
            // عرض الإحصائيات
            const statsHtml = `
                <div class="stat-card">
                    <div class="stat-number">${data.users_count}</div>
                    <div class="stat-label">👥 مستخدم</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${data.prompts_count}</div>
                    <div class="stat-label">📝 برومبت</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${data.top_prompts.length}</div>
                    <div class="stat-label">🏷️ أنواع مختلفة</div>
                </div>
            `;
            document.getElementById('stats').innerHTML = statsHtml;
            
            // رسم الرسم البياني للبرومبتات
            const ctx = document.getElementById('promptsChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.top_prompts.map(p => p.prompt_type),
                    datasets: [{
                        label: 'عدد الاستخدامات',
                        data: data.top_prompts.map(p => p.count),
                        backgroundColor: 'rgba(54, 162, 235, 0.5)',
                        borderColor: 'rgba(54, 162, 235, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: { color: '#fff' }
                        }
                    }
                }
            });
        }
        
        // جلب المستخدمين
        async function loadUsers() {
            const response = await fetch('/api/users');
            const users = await response.json();
            
            const tbody = document.querySelector('#usersTable tbody');
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.user_id}</td>
                    <td>${user.username || '—'}</td>
                    <td>${user.language}</td>
                    <td>${new Date(user.created_at).toLocaleDateString('ar')}</td>
                </tr>
            `).join('');
        }
        
        // تحميل البيانات
        loadStats();
        loadUsers();
        
        // تحديث كل 30 ثانية
        setInterval(() => {
            loadStats();
            loadUsers();
        }, 30000);
    </script>
</body>
</html>
